<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realistic Planets</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <header class="bg-dark bg-opacity-50 text-white py-3">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">
      <div class="d-flex align-items-center gap-2">
        <img src="planet logo.png" width="60" height="60" alt="Planet Logo"/>
        <h1 class="h4 m-0">The Planets</h1>
      </div>
      <ul class="nav">
        <li class="nav-item"><a class="nav-link text-white" data-planet="mercury" href="#">Mercury</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="venus" href="#">Venus</a></li>
        <li class="nav-item"><a class="nav-link text-white active" data-planet="earth" href="#">Earth</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="mars" href="#">Mars</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="jupiter" href="#">Jupiter</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="saturn" href="#">Saturn</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="uranus" href="#">Uranus</a></li>
        <li class="nav-item"><a class="nav-link text-white" data-planet="neptune" href="#">Neptune</a></li>
      </ul>
    </div>
  </header>

  <main class="planet-section text-white text-center py-5">
    <div class="planet-wrapper mx-auto">
      <div class="planet-image" id="planet-image"></div>
    </div>
    <div class="planet-description container">
      <h1 id="planet-name">Earth</h1>
      <p id="planet-description">Loading...</p>
      <p>Source: <a href="#" id="planet-source" class="text-info" target="_blank">Wikipedia</a></p>
      <div class="d-flex flex-column gap-2 align-items-center mt-4">
        <button class="btn btn-outline-light tab active" data-tab="description">01 OVERVIEW</button>
        <button class="btn btn-outline-light tab" data-tab="structure">02 INTERNAL STRUCTURE</button>
        <button class="btn btn-outline-light tab" data-tab="geology">03 SURFACE GEOLOGY</button>
      </div>
    </div>

    <section class="planet-stats container mt-5 row g-3">
      <div class="col-6 col-md-3"><div class="stat-box"><h4>Rotation</h4><p id="rotation"></p></div></div>
      <div class="col-6 col-md-3"><div class="stat-box"><h4>Revolution</h4><p id="revolution"></p></div></div>
      <div class="col-6 col-md-3"><div class="stat-box"><h4>Radius</h4><p id="radius"></p></div></div>
      <div class="col-6 col-md-3"><div class="stat-box"><h4>Temperature</h4><p id="temperature"></p></div></div>
    </section>
  </main>

  <button id="scrollTopBtn" title="Go to top">↑</button>
  <script src="script.js"></script>
</body>
</html>
